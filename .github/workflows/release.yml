name: Release

# Push a version tag (e.g. v0.1.0) to build, sign, notarize, and publish the
# macOS build to a GitHub Release. Required repo secrets are listed in RELEASING.md.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build, sign, notarize, and publish
        run: pnpm run release:mac
        env:
          # Code signing: base64 of the Developer ID Application .p12 + its password.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization (consumed by build/notarize.cjs). The Team ID isn't
          # secret (it's embedded in every signed app), so it's inline here.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: 7E2VA357ZD
          # electron-builder uses this to publish the draft GitHub Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
